# =============================================================================
# Deploy — runs on push to main only (STEP 21)
#
# Jobs:
#   1. deploy-dev — tests → package Lambdas → terraform apply against dev
#
# Auth: GitHub Actions assumes the `cloudguard-dev-github-deploy-role` via
# OIDC. The role's trust policy condition pins `sub` to
#   repo:<org>/<repo>:ref:refs/heads/main
# so only push-to-main workflow runs can assume it. A PR-triggered run from
# a branch — even one that edits this file to point at the deploy role —
# will get AccessDenied from STS. The branch-scoped trust policy IS the
# security boundary, not the workflow file itself (which is mutable by PRs).
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Critical: never let two apply runs race. cancel-in-progress is false because
# cancelling mid-apply leaves Terraform state in a half-applied state we'd
# have to manually unstick. Queue instead.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  TF_VERSION: "1.14.6"
  PYTHON_VERSION: "3.12"

jobs:
  deploy-dev:
    name: Apply to dev
    runs-on: ubuntu-latest
    # `environment: dev` ties this job to the dev GitHub environment, which
    # can carry environment-scoped variables + required-reviewer approval
    # gates if we want to add manual approval later.
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest

      # Run tests in the deploy job too (defense in depth — CI already ran
      # them on the PR, but the merge commit's tree is not byte-identical to
      # the PR tree if any conflicts auto-resolved). Failing here aborts the
      # deploy before any AWS API call.
      - name: Run pytest
        run: pytest tests/ -v

      - name: Package Lambdas
        run: bash scripts/package_lambdas.sh

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: terraform/environments/dev
        run: terraform init -no-color

      # Plan-then-apply with a saved plan file. Two reasons:
      #   1. Race protection: apply only the exact changes plan saw, not
      #      whatever happens to be in state by the time apply runs.
      #   2. Audit trail: the saved plan is uploaded as an artifact for review.
      - name: terraform plan
        working-directory: terraform/environments/dev
        run: terraform plan -no-color -input=false -lock-timeout=5m -out=tfplan
        env:
          TF_VAR_bucket_suffix: ${{ vars.BUCKET_SUFFIX }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

      - name: terraform apply
        working-directory: terraform/environments/dev
        run: terraform apply -no-color -input=false -lock-timeout=5m tfplan

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/environments/dev/tfplan
          retention-days: 14
