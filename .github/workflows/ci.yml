# =============================================================================
# CI — runs on every PR + every push to a non-main branch (STEP 21)
#
# Jobs (intentionally fan-out — parallel where possible):
#   1. lint           — terraform fmt + validate (no AWS creds needed)
#   2. test           — pytest (no AWS creds needed)
#   3. checkov        — Checkov security scan, hard-fail on any unsuppressed finding
#   4. terraform-plan — terraform plan against dev (OIDC into plan role)
#
# Auth: GitHub Actions assumes the `cloudguard-dev-github-plan-role` via OIDC.
# No long-lived access keys anywhere. The role ARN comes from a GitHub repo
# variable (NOT a secret — role ARNs are not sensitive; the security boundary
# is the trust policy's `sub` condition pinning the principal to this repo).
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

# id-token: write is REQUIRED to mint the GitHub OIDC token.
# Without it, configure-aws-credentials fails with "Not authorized to perform sts:AssumeRoleWithWebIdentity".
# pull-requests: write lets the plan job comment the plan diff on the PR.
permissions:
  id-token: write
  contents: read
  pull-requests: write

# Belt-and-braces: never run two CI runs concurrently on the same branch/PR.
# `cancel-in-progress: true` saves CI minutes on rapid push-after-push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  TF_VERSION: "1.14.6"
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # lint — terraform fmt + validate. No AWS creds, no state pull.
  # `-backend=false` on init skips backend configuration so this job runs
  # even on a fork PR where OIDC isn't available.
  # ---------------------------------------------------------------------------
  lint:
    name: Terraform lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: terraform validate (dev)
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

  # ---------------------------------------------------------------------------
  # test — pytest. Mocks-only (no moto, no AWS); matches local dev.
  # ---------------------------------------------------------------------------
  test:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest

      - name: Run pytest
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # checkov — Terraform security scan. Configured via .checkov.yaml at the
  # repo root, which carries the suppression list with one-line justifications
  # for each suppressed check ID. Any unsuppressed finding fails the job.
  #
  # Independent of lint/test on purpose — security scan should not be gated by
  # an unrelated flake in another job.
  # ---------------------------------------------------------------------------
  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          config_file: .checkov.yaml
          quiet: true
          # soft_fail is intentionally NOT set → defaults to false → hard fail.

  # ---------------------------------------------------------------------------
  # terraform-plan — assumes the OIDC plan role and runs `terraform plan`.
  # Posts the plan diff back to the PR as a comment so reviewers don't have
  # to dig into Actions logs to see what will change.
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: Terraform plan (dev)
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Skip on forks where OIDC isn't trusted — they'd just fail at assume-role.
    if: github.event.pull_request.head.repo.fork != true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Lambda zips are content-hashed by archive_file → without populated
      # build/ dirs, plan reports source_code_hash drift on every run.
      - name: Package Lambdas (populate src/*/build/)
        run: bash scripts/package_lambdas.sh

      # Mint a short-lived (~1h) credential via OIDC. AWS_PLAN_ROLE_ARN lives
      # in repo Settings → Secrets and variables → Actions → Variables.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: terraform/environments/dev
        run: terraform init -no-color

      - name: terraform plan
        id: plan
        working-directory: terraform/environments/dev
        # tee → file so the PR comment step can read it back without piping
        # through GitHub's masked step-output (which truncates at ~1 MB).
        run: |
          terraform plan -no-color -input=false -lock-timeout=5m \
            | tee /tmp/tf-plan.txt
        # bucket_suffix is required by variables.tf — comes from a non-default
        # input. In CI we'd typically set it via TF_VAR_bucket_suffix from a
        # GitHub variable; for now the dev state already has it pinned, so
        # plan reads the existing value from state.
        env:
          TF_VAR_bucket_suffix: ${{ vars.BUCKET_SUFFIX }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/tf-plan.txt', 'utf8');
            // GitHub comments cap at 65 536 chars — truncate long plans.
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... [truncated — see Actions log]'
              : plan;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform plan (dev)\n\n<details><summary>Click to expand</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`,
            });
